name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  compile-firmware:
    name: Compile firmware (ESP32-C3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile sketch for esp32:esp32:esp32c3
        uses: arduino/compile-sketches@v1
        with:
          fqbn: "esp32:esp32:esp32c3"
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          libraries: |
            - name: ESP32-BLE-Gamepad
            - name: NimBLE-Arduino
          sketch-paths: |
            - firmware/gamepad
          verbose: false

  lint-host:
    name: Byte-compile host driver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r host/requirements.txt

      - name: py_compile
        run: python -m py_compile host/gamepad.py host/example_demo.py
